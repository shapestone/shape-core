version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gocritic
    - revive
    - unconvert
    - unparam
    - gosec
    - prealloc

  settings:
    errcheck:
      check-blank: true
      check-type-assertions: true

    govet:
      disable:
        - shadow
        - fieldalignment

    staticcheck:
      checks:
        - "all"
        - "-QF1001"
        - "-QF1012"

    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false
          arguments:
            - "checkPrivateReceivers"
            - "sayRepetitiveInsteadOfStutters"

    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - whyNoLint
        - unnamedResult
        - hugeParam
        - rangeValCopy
        - emptyStringTest
        - paramTypeCombine
        - elseif
        - ifElseChain
        - sprintfQuotedString
        - builtinShadow
        - builtinShadowDecl
        - wrapperFunc
        - importShadow

  exclusions:
    rules:
      # Exclude some linters from running on tests files.
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - funlen

      # Disable appendCombine for simplicity
      - linters:
          - gocritic
        text: "appendCombine"

      # Disable errcheck for ast_comparator (type assertions are safe)
      - path: pkg/grammar/ast_comparator\.go
        linters:
          - errcheck

      # Pre-existing unhandled errors in stream and validator (G104)
      - linters:
          - gosec
        text: "G104"

      # Pre-existing integer overflow conversion (G115)
      - linters:
          - gosec
        text: "G115"

      # Pre-existing missing exported comments
      - linters:
          - revive
        text: "exported:"

      # Pre-existing prealloc suggestions
      - linters:
          - prealloc
        path: "pkg/ast/printer\\.go|pkg/tokenizer/tokens\\.go"

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    gofmt:
      simplify: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
