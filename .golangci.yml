version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - gocritic
    - revive
    - stylecheck
    - unconvert
    - unparam
    - gosec
    - prealloc

  settings:
    errcheck:
      check-blank: true
      check-type-assertions: true

    govet:
      disable:
        - shadow
        - fieldalignment

    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false
          arguments:
            - "checkPrivateReceivers"
            - "sayRepetitiveInsteadOfStutters"

    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - whyNoLint
        - unnamedResult
        - hugeParam
        - rangeValCopy
        - emptyStringTest
        - paramTypeCombine
        - elseif
        - ifElseChain
        - sprintfQuotedString
        - builtinShadow
        - builtinShadowDecl
        - wrapperFunc

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

exclusions:
  rules:
    # Exclude some linters from running on tests files.
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
        - funlen

    # Disable appendCombine for simplicity
    - linters:
        - gocritic
      text: "appendCombine"

    # Disable errcheck for ast_comparator (type assertions are safe)
    - path: pkg/grammar/ast_comparator\.go
      linters:
        - errcheck
